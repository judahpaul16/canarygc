version: 2
updates:
  - package-ecosystem: npm
    directory: /compose/svelte-kit
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      all:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    ignore:
      # typescript-eslint peer-caps TypeScript below the next major, so a
      # TypeScript major bump breaks npm ci until typescript-eslint catches up.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directories:
      - /compose/svelte-kit
      - /compose/sitl
    schedule:
      interval: monthly
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns: ["*"]
