map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name _;

    # Firmware images and mission files upload through the app.
    client_max_body_size 32m;

    # JSON API responses compress ~4x over the cellular link. The default type
    # list excludes text/event-stream, so telemetry streams stay unbuffered.
    gzip on;
    gzip_types application/json;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Telemetry streams over Server-Sent Events: hold the connection open and
        # forward each chunk immediately instead of buffering the response.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
